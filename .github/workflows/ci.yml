name: CI - Contract Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  consumer:
    name: Consumer Tests (user-service)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Test, check coverage & package
        run: mvn -f user-service/pom.xml verify -B

      - name: Upload pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: user-service/target/pacts/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-user-service
          path: user-service/target/site/jacoco/
          retention-days: 7

  provider:
    name: Provider Tests (order-service)
    runs-on: ubuntu-latest
    needs: consumer

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Test, check coverage & package
        run: mvn -f order-service/pom.xml verify -B

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-order-service
          path: order-service/target/site/jacoco/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'
          retention-days: 7
