name: CI - Contract Testing

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  consumer-tests:
    name: Consumer Tests (user-service)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Consumer Pact Tests (generates contracts)
        run: |
          cd user-service
          mvn test -Dtest=OrderConsumerPactTest -B

      - name: Upload Pact contracts
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: user-service/target/pacts/
          retention-days: 7

  provider-tests:
    name: Provider Tests (order-service)
    runs-on: ubuntu-latest
    needs: consumer-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download Pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Verify Provider against contracts
        run: |
          cd order-service
          mvn test -Dtest=OrderProviderPactTest -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'
          retention-days: 7

  build:
    name: Build all services
    runs-on: ubuntu-latest
    needs: [consumer-tests, provider-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build order-service
        run: |
          cd order-service
          mvn clean package -DskipTests -B

      - name: Build user-service
        run: |
          cd user-service
          mvn clean package -DskipTests -B
